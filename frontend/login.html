<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Inicio de sesión | Sistema Vehicular</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="assets/css/styles.css?v=20260617" rel="stylesheet">
</head>
<body class="login-page">
  <main class="login-card p-4 p-md-5">
    <div class="d-flex align-items-center gap-3 mb-4">
      <div class="brand-mark"><i class="bi bi-truck-front"></i></div>
      <div>
        <h1 class="h4 mb-1 fw-bold">Sistema Vehicular</h1>
        <div class="text-muted">Gestión de atención empresarial</div>
      </div>
    </div>
    <div id="loginMessage"></div>
    <form id="loginForm" class="needs-validation" novalidate>
      <div class="mb-3">
        <label class="form-label">Correo electrónico</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-envelope"></i></span>
          <input class="form-control" type="email" name="email" value="admin@sistema.com" required>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label">Contraseña</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input class="form-control" type="password" name="password" value="admin123" required>
        </div>
      </div>
      <button class="btn btn-primary btn-lg w-100 btn-icon" type="submit"><i class="bi bi-box-arrow-in-right"></i> Iniciar sesión</button>
    </form>
    <div class="mt-4 small text-muted">
      Usuarios de prueba: admin@sistema.com, coordinador@sistema.com, solicitante@sistema.com, conductor@sistema.com
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/config.js?v=20260617"></script>
  <script src="assets/js/utils.js?v=20260617"></script>
  <script src="assets/js/auth.js?v=20260617"></script>
</body>
</html>
